function mkStage(n){
  const L=n<=5?EASY[n-1]:LAYOUTS[(n-6)%5];
  const plats=[];
  L.ps.forEach((rp,ri)=>rp.forEach(p=>plats.push({r:L.rows[ri],c:p.c,w:p.w})));
  const lads=L.lads.map(l=>({c:l[0],rT:L.rows[l[2]],rB:L.rows[l[1]]}));

  // Items: fruits + balls spread across rows
  const items=[];
  const fruits=['apple','cherry','berry','banana','grape'];
  for(let ri=1;ri<L.rows.length;ri++){
    const r=L.rows[ri]-1;// standing row
    const rPlats=L.ps[ri];
    rPlats.forEach((p,pi)=>{
      const numI=1+Math.floor(n/6);
      for(let j=0;j<Math.min(numI,3);j++){
        const col=p.c+1+j*Math.floor(Math.max(1,(p.w-2)/Math.min(numI,3)));
        if(col<p.c+p.w-1){
          const isBall=(j+ri+n)%3===0;
          items.push({c:col,r,t:isBall?'ball':fruits[(n+ri+j)%5]});
        }
      }
    });
  }
  // Master ball at top
  items.push({c:L.goalC,r:L.rows[L.rows.length-1]-1,t:'master'});

  // Star power-up for stages 11+ (one per stage, on middle floor)
  if(n>=11){
    const starRi=Math.floor(L.rows.length/2);
    const starP=L.ps[starRi][L.ps[starRi].length-1];
    items.push({c:starP.c+Math.floor(starP.w/2),r:L.rows[starRi]-1,t:'star'});
  }

  // === CLASSIC DIFFICULTY CURVE ===
  // Speed: slow curve early, steeper late (not linear)
  // 1-3: 0.4~0.5 | 4-7: 0.55~0.7 | 8-12: 0.75~1.0 | 13-16: 1.0~1.2 | 17-20: 1.2~1.4
  const spdTable=[.4,.45,.5,.55,.6,.65,.7,.75,.8,.9,.95,1.0,1.05,1.1,1.15,1.2,1.25,1.3,1.35,1.4];
  const bSpd=spdTable[Math.min(n-1,19)];

  // Monster count: max 5-6, gradual
  // 1-3: 2 small, 0 big | 4-7: 2 small, 1 big | 8-12: 3 small, 1 big | 13-16: 3 small, 2 big | 17-19: 3 small, 2 big | 20: 4 small, 2 big
  const enemies=[];
  const numSmall=n<=7?2:n<=19?3:4;
  const numBig=n<=3?0:n<=12?1:2;

  // Place small enemies spread across floors
  for(let i=0;i<numSmall;i++){
    const ri=i%(L.rows.length-1);
    const rPlats=L.ps[ri];
    const p=rPlats[i%rPlats.length];
    const spd=bSpd+(i*.08);
    enemies.push({c:p.c+2,r:L.rows[ri]-1,dir:i%2?-1:1,mn:p.c,mx:p.c+p.w-1,sp:spd,big:0});
  }

  // Place big enemies on middle floors (first appears at stage 4)
  if(numBig>=1){
    const midRi=Math.floor(L.rows.length/2);
    const midP=L.ps[midRi][0];
    enemies.push({c:midP.c+2,r:L.rows[midRi]-1,dir:1,mn:midP.c,mx:midP.c+midP.w-1,sp:bSpd*.75,big:1});
  }
  if(numBig>=2){
    const ri2=Math.max(1,Math.floor(L.rows.length/2)-1);
    const p2=L.ps[ri2][L.ps[ri2].length-1];
    enemies.push({c:p2.c+1,r:L.rows[ri2]-1,dir:-1,mn:p2.c,mx:p2.c+p2.w-1,sp:bSpd*.85,big:1});
  }

  // Obstacles: gradually increase (0→1→2→3)
  const obs=[];
  const numObs=n<=2?0:n<=5?1:n<=12?2:3;
  for(let i=0;i<Math.min(numObs,L.obsC.length);i++){
    const ri=1+i%(L.rows.length-2);
    obs.push({c:L.obsC[i],r:L.rows[ri]});
  }

  return{plats,lads,items,enemies,obs,
    ps:{c:1,r:L.rows[0]-1},
    goal:{c:L.goalC,r:L.rows[L.rows.length-1]}};
}

// BONUS STAGE - no enemies, lots of items!
function mkBonus(){
  const rows=[14,12,10,8,6,4,2];
  const plats=[{r:14,c:0,w:20}];
  const lads=[];
  for(let i=0;i<rows.length-1;i++){
    plats.push({r:rows[i+1],c:0,w:9},{r:rows[i+1],c:10,w:10});
    lads.push({c:4,rT:rows[i+1],rB:rows[i]},{c:15,rT:rows[i+1],rB:rows[i]});
  }
  const items=[];
  const fruits=['apple','cherry','berry','banana','grape'];
  for(let ri=0;ri<rows.length;ri++){
    const r=rows[ri]-1;
    for(let col=1;col<19;col+=2){
      items.push({c:col,r,t:(col+ri)%4===0?'ball':fruits[(col+ri)%5]});
    }
  }
  return{plats,lads,items,enemies:[],obs:[],ps:{c:1,r:13},goal:{c:10,r:rows[rows.length-1]}};
}

// GAME STATE
const PH=26,PW=20,DH=14;
const G={st:'start',sc:0,hi:0,lv:5,sg:1,sd:null,items:[],en:[],obs:[],pt:[],tm:0,ct:0,dt:0,ft:0,spX:0,spY:0,bullets:[],isBonus:false,ghost:null,ghostDone:false};
const P={x:0,y:0,vx:0,vy:0,og:false,ol:false,cl:false,f:1,fr:0,ft:0,duck:false,invT:0,hasStar:false,shootCD:0};

// INPUT
const ks={};const at=new Map();
document.addEventListener('keydown',e=>{ks[e.key]=true;if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Shift','z'].includes(e.key))e.preventDefault();if(G.st==='start'&&e.key===' ')startG();if((G.st==='gameOver'||G.st==='victory')&&e.key===' ')resetG();});
document.addEventListener('keyup',e=>{ks[e.key]=false;});
function gBFT(t){const el=document.elementFromPoint(t.clientX,t.clientY);if(el?.dataset?.key)return el;return el?.closest?.('[data-key]')||null;}
const mcE=document.getElementById('mc');
mcE.addEventListener('touchstart',function(e){e.preventDefault();ea();for(const t of e.changedTouches){const b=gBFT(t);if(b){at.set(t.identifier,b.dataset.key);ks[b.dataset.key]=true;b.classList.add('pressed');}}},{passive:false});
mcE.addEventListener('touchmove',function(e){e.preventDefault();for(const t of e.changedTouches){const ok=at.get(t.identifier);const b=gBFT(t);const nk=b?.dataset?.key||null;if(ok!==nk){if(ok){at.delete(t.identifier);let s=false;at.forEach(v=>{if(v===ok)s=true;});if(!s){ks[ok]=false;document.querySelectorAll('.cb[data-key]').forEach(b=>{if(b.dataset.key===ok)b.classList.remove('pressed');});}}if(nk){at.set(t.identifier,nk);ks[nk]=true;b.classList.add('pressed');}}}},{passive:false});
function hTE(e){e.preventDefault();for(const t of e.changedTouches){const k=at.get(t.identifier);at.delete(t.identifier);if(k){let s=false;at.forEach(v=>{if(v===k)s=true;});if(!s){ks[k]=false;document.querySelectorAll('.cb[data-key]').forEach(b=>{if(b.dataset.key===k)b.classList.remove('pressed');});}}}}
mcE.addEventListener('touchend',hTE,{passive:false});mcE.addEventListener('touchcancel',hTE,{passive:false});
function hGT(e){e.preventDefault();ea();if(G.st==='start')startG();if(G.st==='gameOver'||G.st==='victory')resetG();}
cv.addEventListener('touchstart',hGT,{passive:false});cv.addEventListener('click',hGT);
const ssE=document.getElementById('ss');
ssE.addEventListener('touchstart',e=>{e.preventDefault();ea();if(G.st==='start')startG();},{passive:false});
ssE.addEventListener('click',()=>{ea();if(G.st==='start')startG();});
function ik(k){return!!ks[k];}

// GAME LOGIC
function startG(){ea();G.st='playing';G.sc=0;G.lv=5;G.sg=1;loadS(1);ssE.style.display='none';}
function resetG(){G.st='start';G.sc=0;G.lv=5;G.sg=1;stopBGM();ssE.style.display='flex';}

function loadS(n){
  G.sg=n;G.isBonus=false;G.sd=mkStage(n);G.tm=0;
  G.items=G.sd.items.map(i=>({...i,col:false}));
  G.en=G.sd.enemies.map(e=>({...e,px:e.c*T+T/2,fr:0,ft:0}));
  G.obs=G.sd.obs;G.pt=[];G.bullets=[];
  P.x=G.sd.ps.c*T+6;P.y=G.sd.ps.r*T-PH;
  G.spX=P.x;G.spY=P.y;
  P.vx=0;P.vy=0;P.ol=false;P.cl=false;P.og=true;P.duck=false;P.invT=0;P.hasStar=false;P.shootCD=0;
  G.ghost=null;G.ghostDone=false;
  G.st='playing';startBGM(n-1);uUI();
}
function loadBonus(){
  G.isBonus=true;G.sd=mkBonus();G.tm=0;
  G.items=G.sd.items.map(i=>({...i,col:false}));
  G.en=[];G.obs=[];G.pt=[];G.bullets=[];
  P.x=G.sd.ps.c*T+6;P.y=G.sd.ps.r*T-PH;
  G.spX=P.x;G.spY=P.y;
  P.vx=0;P.vy=0;P.ol=false;P.cl=false;P.og=true;P.duck=false;P.invT=0;P.hasStar=false;P.shootCD=0;
  G.ghost=null;G.ghostDone=false;
  G.st='playing';startBGM(4);uUI();
}
function respawn(){P.x=G.spX;P.y=G.spY;P.vx=0;P.vy=0;P.ol=false;P.cl=false;P.og=true;P.duck=false;P.invT=90;G.st='playing';}
function uUI(){
  document.getElementById('sd').textContent=G.sc;
  document.getElementById('std').textContent=G.isBonus?'BONUS':G.sg+'/20';
  document.getElementById('ld').textContent='⚡'.repeat(Math.max(0,G.lv));
  document.getElementById('hd').textContent=G.hi;
}

// Collision
function chkP(px,py){
  const ft=py+PH;
  for(const p of G.sd.plats){const t=p.r*T,l=p.c*T,r=(p.c+p.w)*T;if(ft>=t&&ft<=t+10&&px+PW>l+2&&px<r-2)return t;}
  return null;
}
function chkL(px,py){
  const cx=px+PW/2,ft=py+PH;
  for(const l of G.sd.lads){const lx=l.c*T,lt=l.rT*T,lb=l.rB*T;if(cx>lx+6&&cx<lx+T-6&&ft>lt+6&&py<lb-2)return{x:lx,top:lt,bot:lb};}
  return null;
}
function chkO(px,py,pw,ph){
  for(const o of G.obs){const ox=o.c*T+6,oy=o.r*T-18,ow=T-12,oh=18;if(px+pw>ox&&px<ox+ow&&py+ph>oy&&py<oy+oh)return true;}
  return false;
}
function addPt(ax,ay,cl,n){for(let i=0;i<n;i++)G.pt.push({x:ax,y:ay,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4-1.5,life:18+Math.random()*14,col:cl,sz:2+Math.random()*3});}

let clT=0;
function update(){
  if(!['playing','dying','stageClear','victory'].includes(G.st))return;
  G.tm++;
  G.pt=G.pt.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life--;return p.life>0;});
  if(P.invT>0)P.invT--;

  if(G.st==='dying'){G.dt--;if(G.dt<=0){if(G.lv<=0){G.st='gameOver';stopBGM();SFX.go();if(G.sc>G.hi)G.hi=G.sc;uUI();}else respawn();}return;}
  if(G.st==='stageClear'){G.ct--;G.ft++;if(G.ct<=0){if(G.isBonus){loadS(11);}else if(G.sg===10){loadBonus();}else if(G.sg>=20){G.st='victory';G.ct=300;stopBGM();SFX.ok();}else loadS(G.sg+1);}return;}
  if(G.st==='victory'){G.ct--;G.ft++;if(G.ct<=0)resetG();return;}

  const SPD=2.0,GRV=0.42,JMP=-4.7,CLM=2.2;

  // Check if on ground floor (row 14) - prevent death from pressing down
  const onGround=P.og&&P.y>=((14)*T-PH-5);

  // Duck
  const wantDuck=ik('Shift')||(ik('ArrowDown')&&P.og&&!chkL(P.x,P.y)&&!onGround);
  if(onGround&&ik('ArrowDown')&&!chkL(P.x,P.y)){
    // On ground floor pressing down -> just duck, don't do anything else
    if(!P.duck)SFX.dk();
    P.duck=true;
  }else if(wantDuck&&P.og&&!P.cl){
    if(!P.duck)SFX.dk();
    P.duck=true;
  }else{P.duck=false;}

  // Ladder entry: only if there IS a ladder here AND pressing up, or pressing down while NOT on ground
  const lad=chkL(P.x,P.y);
  const wantClimb=lad&&(ik('ArrowUp')||(ik('ArrowDown')&&!onGround));
  if(wantClimb){P.ol=true;P.cl=true;P.x=lad.x+(T-PW)/2;P.duck=false;}

  if(P.ol&&P.cl){
    P.vy=0;P.vx=0;
    if(ik('ArrowUp')){P.y-=CLM;clT++;if(clT%8===0)SFX.cl();}
    if(ik('ArrowDown')){P.y+=CLM;clT++;if(clT%8===0)SFX.cl();}
    const still=chkL(P.x,P.y);
    if(!still){P.ol=false;P.cl=false;const s=chkP(P.x,P.y);if(s!==null){P.y=s-PH;P.og=true;}}
    if(ik('ArrowLeft')||ik('ArrowRight')){P.ol=false;P.cl=false;}
  }else{
    P.vx=0;const spd=P.duck?SPD*.4:SPD;
    if(ik('ArrowLeft')){P.vx=-spd;P.f=-1;}
    if(ik('ArrowRight')){P.vx=spd;P.f=1;}
    P.vy+=GRV;if(P.vy>5.5)P.vy=5.5;
    if(ik(' ')&&P.og&&!P.duck){P.vy=JMP;P.og=false;SFX.j();}
    P.x+=P.vx;P.y+=P.vy;
    if(chkO(P.x,P.y,PW,P.duck?DH:PH))P.x-=P.vx;
    const py=chkP(P.x,P.y);
    if(py!==null&&P.vy>=0){P.y=py-PH;P.vy=0;P.og=true;}else if(!P.ol)P.og=false;
  }
  if(P.x<0)P.x=0;if(P.x>W-PW)P.x=W-PW;
  // Don't die from falling below ground
  if(P.y>14*T){P.y=14*T-PH;P.vy=0;P.og=true;}
  if(P.y>H+30){pDie();return;}
  if(P.og&&!P.cl){G.spX=P.x;G.spY=P.y;}

  if(P.vx!==0||P.cl){P.ft++;if(P.ft>6){P.fr=(P.fr+1)%4;P.ft=0;}}else P.fr=0;

  // Items
  for(const it of G.items){
    if(it.col)continue;
    const ix=it.c*T+T/2,iy=it.r*T+T/2,px=P.x+PW/2,py=P.y+PH/2;
    if(Math.hypot(ix-px,iy-py)<22){
      it.col=true;const th=TH[(G.sg-1)%20];
      if(it.t==='master'){SFX.bl();G.sc+=500;addPt(ix,iy,'#fff',14);}
      else if(it.t==='ball'){SFX.bl();G.sc+=200;addPt(ix,iy,th.bl[0],12);}
      else if(it.t==='star'){P.hasStar=true;G.sc+=300;addPt(ix,iy,'#FFD700',16);pt(1047,.15,'square',.1);setTimeout(()=>pt(1319,.15,'square',.1),80);setTimeout(()=>pt(1568,.2,'square',.1),160);}
      else{SFX.co();G.sc+=100;addPt(ix,iy,'#FF6644',10);}
      uUI();
    }
  }

  // Shooting (z key or FIRE button) - only when star collected
  if(P.shootCD>0)P.shootCD--;
  if(ik('z')&&P.hasStar&&P.shootCD<=0&&G.bullets.length<2){
    G.bullets.push({x:P.x+PW/2,y:P.y+PH/2-2,dir:P.f,life:40});
    P.shootCD=15;
    pt(800,.05,'square',.06);setTimeout(()=>pt(1200,.04,'square',.05),30);
  }

  // Update bullets
  G.bullets=G.bullets.filter(b=>{
    b.x+=b.dir*5;b.life--;
    if(b.x<0||b.x>W)return false;
    // Check bullet-enemy collision
    for(let i=G.en.length-1;i>=0;i--){
      const e=G.en[i];
      if(Math.abs(b.x-e.px)<14&&Math.abs(b.y-e.r*T+10)<16){
        addPt(e.px,e.r*T-10,TH[(G.sg-1)%20].sm[0],12);
        G.en.splice(i,1);G.sc+=150;uUI();
        pt(400,.08,'sawtooth',.06);setTimeout(()=>pt(600,.06,'sawtooth',.04),50);
        return false;
      }
    }
    return b.life>0;
  });

  if(G.items.every(i=>i.col)){
    const g=G.sd.goal;
    if(Math.abs(P.x+PW/2-(g.c*T+T/2))<T&&Math.abs(P.y-(g.r*T-PH))<T){
      G.st='stageClear';G.ct=90;G.ft=0;G.sc+=1000;SFX.ok();stopBGM();uUI();
    }
  }

  // Enemies
  for(const e of G.en){
    e.px+=e.sp*e.dir;
    if(e.px<=e.mn*T+10){e.px=e.mn*T+10;e.dir=1;}
    if(e.px>=(e.mx+1)*T-10){e.px=(e.mx+1)*T-10;e.dir=-1;}
    e.ft++;if(e.ft>10){e.fr=(e.fr+1)%2;e.ft=0;}
    if(P.invT>0)continue;
    // Enemy feet are at e.r*T, body extends upward
    // Small: 16px tall, Big: 30px tall
    const eBase=e.r*T;// feet level
    const eH=e.big?30:16,eW=e.big?22:12;
    const eCenterY=eBase-eH/2;// center of enemy body
    const px=P.x+PW/2;
    const pCenterY=P.y+(P.duck?PH-DH/2:PH/2);
    const pHalfH=P.duck?DH/2:PH/2;
    if(P.duck&&!e.big)continue;
    if(Math.abs(e.px-px)<(eW+PW/2-2)&&Math.abs(eCenterY-pCenterY)<(eH/2+pHalfH-2)){pDie();return;}
  }

  // Ghost duck on stages 3,6,9,12,15,18
  const ghostStages=[3,6,9,12,15,18];
  if(ghostStages.includes(G.sg)&&!G.isBonus){
    // Spawn ghost after ~180 frames, once per stage
    if(!G.ghost&&!G.ghostDone&&G.tm>180){
      const rows=G.sd.lads.length>0?G.sd.plats.map(p=>p.r).filter((v,i,a)=>a.indexOf(v)===i&&v<14).sort((a,b)=>a-b):[];
      const pickRow=rows.length>=4?rows[Math.random()<.5?1:3]:rows.length>=2?rows[1]:8;
      const fromLeft=Math.random()<.5;
      G.ghost={x:fromLeft?-30:W+30,y:pickRow*T-20,dir:fromLeft?1:-1,alpha:0,sndT:0};
      // Spooky entrance sound
      pt(150,.5,'sine',.04);setTimeout(()=>pt(120,.6,'sine',.03),200);setTimeout(()=>pt(100,.8,'sine',.03),500);
    }
    if(G.ghost){
      const gh=G.ghost;
      gh.x+=gh.dir*.6;// slow drift
      gh.alpha=Math.min(gh.alpha+.008,.55);// fade in to semi-transparent
      gh.sndT++;
      // Periodic eerie sound
      if(gh.sndT%60===0)pt(100+Math.random()*50,.3,'sine',.02);
      // Player collision
      if(P.invT<=0){
        const px=P.x+PW/2,py=P.y+PH/2;
        if(Math.abs(gh.x-px)<18&&Math.abs(gh.y-py)<18){pDie();G.ghost=null;G.ghostDone=true;return;}
      }
      // Remove when fully crossed
      if((gh.dir>0&&gh.x>W+40)||(gh.dir<0&&gh.x<-40)){G.ghost=null;G.ghostDone=true;}
    }
  }
}
function pDie(){G.lv--;G.st='dying';G.dt=35;SFX.di();addPt(P.x+PW/2,P.y+PH/2,'#FFD700',16);uUI();}

// === DRAWING ===
function drawPika(px,py,face,fr,dying,duck){
  C.save();
  if(dying)C.globalAlpha=.4+Math.sin(G.tm*.5)*.3;
  if(P.invT>0&&P.invT%4<2)C.globalAlpha=.3;
  const cx=px,cy=duck?py+PH-DH:py;
  if(face<0){C.translate(px+PW,0);C.scale(-1,1);C.translate(-px,0);}
  if(!duck){
    C.fillStyle='#222';
    C.beginPath();C.moveTo(cx+2,cy+2);C.lineTo(cx-1,cy-9);C.lineTo(cx+6,cy);C.fill();
    C.beginPath();C.moveTo(cx+PW-2,cy+2);C.lineTo(cx+PW+1,cy-9);C.lineTo(cx+PW-6,cy);C.fill();
    C.fillStyle='#FFD700';
    C.beginPath();C.moveTo(cx+2,cy+2);C.lineTo(cx,cy-5);C.lineTo(cx+6,cy+1);C.fill();
    C.beginPath();C.moveTo(cx+PW-2,cy+2);C.lineTo(cx+PW,cy-5);C.lineTo(cx+PW-6,cy+1);C.fill();
    C.fillStyle='#FFD700';C.fillRect(cx+1,cy+2,PW-2,PH-4);C.fillRect(cx+2,cy+1,PW-4,PH-2);
    C.fillStyle='#FFF5C0';C.fillRect(cx+5,cy+12,PW-10,PH-16);
    C.fillStyle='#111';C.fillRect(cx+4,cy+5,3,3);C.fillRect(cx+PW-7,cy+5,3,3);
    C.fillStyle='#fff';C.fillRect(cx+4,cy+5,1,1);C.fillRect(cx+PW-7,cy+5,1,1);
    C.fillStyle='#FF5555';C.fillRect(cx+1,cy+8,3,2);C.fillRect(cx+PW-4,cy+8,3,2);
    C.fillStyle='#A06000';C.fillRect(cx+8,cy+10,4,1);
    C.fillStyle='#CCA000';const tw=Math.sin(G.tm*.12+fr)*2;
    C.fillRect(cx+PW+tw,cy+6,3,2);C.fillRect(cx+PW+2+tw,cy+8,2,2);C.fillRect(cx+PW+tw,cy+10,3,2);
    C.fillStyle='#CCA000';const lo=Math.sin(fr*Math.PI/2)*2;
    C.fillRect(cx+3,cy+PH-4+(fr%2===0?lo:0),5,4);C.fillRect(cx+PW-8,cy+PH-4+(fr%2===1?lo:0),5,4);
  }else{
    C.fillStyle='#FFD700';C.fillRect(cx,cy+2,PW,DH-2);C.fillRect(cx+1,cy+1,PW-2,DH);
    C.fillStyle='#FFF5C0';C.fillRect(cx+4,cy+6,PW-8,DH-8);
    C.fillStyle='#111';C.fillRect(cx+3,cy+4,4,2);C.fillRect(cx+PW-7,cy+4,4,2);
    C.fillStyle='#FF5555';C.fillRect(cx+1,cy+6,3,2);C.fillRect(cx+PW-4,cy+6,3,2);
    C.fillStyle='#FFD700';C.fillRect(cx-3,cy+1,5,3);C.fillRect(cx+PW-2,cy+1,5,3);
    C.fillStyle='#222';C.fillRect(cx-3,cy+1,2,2);C.fillRect(cx+PW+1,cy+1,2,2);
  }
  C.restore();
}

// Big monster
function drawBM(ex,ey,fr,th){
  const bc=th.bm,by=ey;
  // Big round body
  C.fillStyle=bc[0];
  C.beginPath();C.arc(ex,by-14,12,0,Math.PI*2);C.fill();
  C.fillRect(ex-12,by-14,24,14);
  // Belly
  C.fillStyle=bc[1];C.fillRect(ex-6,by-8,12,6);
  // Horns
  C.fillStyle=bc[1];
  C.beginPath();C.moveTo(ex-8,by-24);C.lineTo(ex-5,by-18);C.lineTo(ex-11,by-18);C.fill();
  C.beginPath();C.moveTo(ex+8,by-24);C.lineTo(ex+5,by-18);C.lineTo(ex+11,by-18);C.fill();
  // Eyes (angry cute)
  C.fillStyle='#fff';C.fillRect(ex-7,by-20,6,5);C.fillRect(ex+2,by-20,6,5);
  C.fillStyle='#CC2222';C.fillRect(ex-5,by-18,3,3);C.fillRect(ex+4,by-18,3,3);
  C.fillStyle='#111';C.fillRect(ex-4,by-17,2,2);C.fillRect(ex+4,by-17,2,2);
  // Angry brows
  C.fillStyle=bc[1];C.fillRect(ex-7,by-21,5,1);C.fillRect(ex+3,by-21,5,1);
  // Mouth
  C.fillStyle='#440000';C.fillRect(ex-4,by-10,8,4);
  C.fillStyle='#fff';C.fillRect(ex-3,by-10,2,2);C.fillRect(ex+1,by-10,2,2);
  // Arms
  C.fillStyle=bc[0];C.fillRect(ex-14,by-16,4,8);C.fillRect(ex+10,by-16,4,8);
  // Feet
  C.fillStyle=bc[1];
  const lo=Math.sin(fr*Math.PI)*2;
  C.fillRect(ex-9,by-1+lo,6,3);C.fillRect(ex+3,by-1-lo,6,3);
}

function drawBall(bx,by,sg){

function drawItem(it,sg){
  if(it.col)return;
  const ix=it.c*T+T/2,iy=it.r*T+T/2+Math.sin(G.tm*.06+it.c)*2;
  C.save();
  if(it.t==='ball'){drawBall(ix,iy,sg);}
  else if(it.t==='master'){
    C.fillStyle='#111';C.beginPath();C.arc(ix,iy,12.5,0,Math.PI*2);C.fill();
    C.fillStyle='#9933FF';C.beginPath();C.arc(ix,iy,11,Math.PI,0);C.fill();
    C.fillStyle='#fff';C.beginPath();C.arc(ix,iy,11,0,Math.PI);C.fill();
    C.fillStyle='#222';C.fillRect(ix-12,iy-1.5,24,3);
    C.fillStyle='#FF69B4';C.fillRect(ix-3,iy-7,2,5);C.fillRect(ix+1,iy-7,2,5);C.fillRect(ix-1,iy-5,2,2);
    C.fillStyle='#fff';C.beginPath();C.arc(ix,iy,3.5,0,Math.PI*2);C.fill();C.fillStyle='#222';C.beginPath();C.arc(ix,iy,2.5,0,Math.PI*2);C.fill();
    C.fillStyle='#fff';C.beginPath();C.arc(ix,iy,1.2,0,Math.PI*2);C.fill();
    C.fillStyle=`rgba(255,255,255,${.5+Math.sin(G.tm*.12)*.4})`;C.fillRect(ix+7+Math.sin(G.tm*.1)*2,iy-9,3,3);
  }else if(it.t==='star'){
    // Spinning glowing star
    const pulse=.8+Math.sin(G.tm*.1)*.2;
    C.fillStyle=`rgba(255,215,0,${.2+Math.sin(G.tm*.08)*.1})`;C.beginPath();C.arc(ix,iy,14,0,Math.PI*2);C.fill();
    C.strokeStyle='#111';C.lineWidth=2;
    C.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2+G.tm*.03;C.lineTo(ix+Math.cos(a)*10*pulse,iy+Math.sin(a)*10*pulse);const a2=a+2*Math.PI/5;C.lineTo(ix+Math.cos(a2)*4*pulse,iy+Math.sin(a2)*4*pulse);}C.closePath();C.stroke();
    C.fillStyle='#FFD700';C.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2+G.tm*.03;C.lineTo(ix+Math.cos(a)*9*pulse,iy+Math.sin(a)*9*pulse);const a2=a+2*Math.PI/5;C.lineTo(ix+Math.cos(a2)*3.5*pulse,iy+Math.sin(a2)*3.5*pulse);}C.closePath();C.fill();
    C.fillStyle='#FFF8DC';C.beginPath();C.arc(ix,iy,3,0,Math.PI*2);C.fill();
  }else{
    const F={
      apple(){C.strokeStyle='#111';C.lineWidth=2;C.beginPath();C.arc(ix,iy,8,0,Math.PI*2);C.stroke();C.fillStyle='#FF3333';C.beginPath();C.arc(ix,iy,7,0,Math.PI*2);C.fill();C.fillStyle='#FF8888';C.beginPath();C.arc(ix-2,iy-2,3,0,Math.PI*2);C.fill();C.fillStyle='#44AA22';C.fillRect(ix-1,iy-10,2,4);C.fillStyle='#66CC33';C.fillRect(ix+1,iy-9,3,2);},
      cherry(){C.strokeStyle='#111';C.lineWidth=1.5;C.beginPath();C.arc(ix-3,iy+1,6,0,Math.PI*2);C.stroke();C.beginPath();C.arc(ix+3,iy+1,6,0,Math.PI*2);C.stroke();C.fillStyle='#FF0066';C.beginPath();C.arc(ix-3,iy+1,5,0,Math.PI*2);C.fill();C.beginPath();C.arc(ix+3,iy+1,5,0,Math.PI*2);C.fill();C.fillStyle='#FF66AA';C.beginPath();C.arc(ix-4,iy-1,2,0,Math.PI*2);C.fill();C.beginPath();C.arc(ix+2,iy-1,2,0,Math.PI*2);C.fill();C.strokeStyle='#44AA22';C.lineWidth=2;C.beginPath();C.moveTo(ix-3,iy-4);C.quadraticCurveTo(ix,iy-10,ix+3,iy-4);C.stroke();},
      berry(){C.strokeStyle='#111';C.lineWidth=2;C.beginPath();C.arc(ix,iy,7,0,Math.PI*2);C.stroke();C.fillStyle='#7744FF';C.beginPath();C.arc(ix,iy,6,0,Math.PI*2);C.fill();C.fillStyle='#AA77FF';C.beginPath();C.arc(ix-2,iy-1,2.5,0,Math.PI*2);C.fill();C.fillStyle='#44BB22';C.fillRect(ix-1,iy-9,3,3);},
      banana(){C.strokeStyle='#111';C.lineWidth=2;C.beginPath();C.moveTo(ix-6,iy+4);C.quadraticCurveTo(ix-2,iy-8,ix+6,iy-2);C.quadraticCurveTo(ix,iy-4,ix-6,iy+4);C.stroke();C.fillStyle='#FFD700';C.beginPath();C.moveTo(ix-5,iy+3);C.quadraticCurveTo(ix-2,iy-7,ix+5,iy-1);C.quadraticCurveTo(ix,iy-3,ix-5,iy+3);C.fill();C.fillStyle='#FFED80';C.fillRect(ix-2,iy-3,4,3);C.fillStyle='#8B6914';C.fillRect(ix+3,iy-2,2,2);},
      grape(){C.strokeStyle='#111';C.lineWidth=1;for(let r=0;r<3;r++)for(let cc=0;cc<3-r;cc++){C.beginPath();C.arc(ix-4+cc*5+r*2.5,iy-3+r*4,4,0,Math.PI*2);C.stroke();}C.fillStyle='#8833CC';for(let r=0;r<3;r++)for(let cc=0;cc<3-r;cc++){C.beginPath();C.arc(ix-4+cc*5+r*2.5,iy-3+r*4,3,0,Math.PI*2);C.fill();}C.fillStyle='#BB66FF';C.beginPath();C.arc(ix-4,iy-3,1.5,0,Math.PI*2);C.fill();C.fillStyle='#44AA22';C.fillRect(ix-1,iy-10,2,4);}
    };(F[it.t]||F.apple)();
  }
  C.restore();
}

// Country flags per stage (20 countries)
function drawCountryFlag(cx,cy,w,h,sg){
  const s=sg%20||20;
  const fw=w,fh=h;

    case 1:// Korea 태극기
      C.fillStyle='#fff';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#CD2E3A';C.beginPath();C.arc(cx+fw/2,cy+fh/2,fh*.3,0,Math.PI,true);C.fill();
      C.fillStyle='#0047A0';C.beginPath();C.arc(cx+fw/2,cy+fh/2,fh*.3,0,Math.PI,false);C.fill();
      break;
    case 2:// Japan 일장기
      C.fillStyle='#fff';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#BC002D';C.beginPath();C.arc(cx+fw/2,cy+fh/2,fh*.28,0,Math.PI*2);C.fill();

      C.fillStyle='#DE2910';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#FFDE00';C.fillRect(cx+2,cy+2,3,3);C.fillRect(cx+6,cy+1,2,1);C.fillRect(cx+7,cy+3,2,1);C.fillRect(cx+6,cy+5,2,1);
      break;
    case 4:// Australia
      C.fillStyle='#00008B';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#fff';C.fillRect(cx+fw*.3,cy+fh*.4,3,3);C.fillRect(cx+fw*.6,cy+fh*.3,2,2);C.fillRect(cx+fw*.7,cy+fh*.6,2,2);C.fillRect(cx+fw*.5,cy+fh*.7,2,2);
      C.fillStyle='#FF0000';C.fillRect(cx,cy,fw*.35,fh*.5);C.fillStyle='#fff';C.fillRect(cx+1,cy+fh*.2,fw*.33,1);C.fillRect(cx+fw*.15,cy+1,1,fh*.48);
      break;
    case 5:// France
      C.fillStyle='#002395';C.fillRect(cx,cy,fw/3,fh);
      C.fillStyle='#fff';C.fillRect(cx+fw/3,cy,fw/3,fh);
      C.fillStyle='#ED2939';C.fillRect(cx+fw*2/3,cy,fw/3,fh);
      break;
    case 6:// Germany
      C.fillStyle='#000';C.fillRect(cx,cy,fw,fh/3);
      C.fillStyle='#DD0000';C.fillRect(cx,cy+fh/3,fw,fh/3);
      C.fillStyle='#FFCC00';C.fillRect(cx,cy+fh*2/3,fw,fh/3);

    case 8:// South Africa
      C.fillStyle='#007A4D';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#FFB612';C.fillRect(cx,cy,fw,fh*.33);
      C.fillStyle='#DE3831';C.fillRect(cx,cy,fw,fh*.15);
      C.fillStyle='#002395';C.fillRect(cx,cy+fh*.67,fw,fh*.33);
      C.fillStyle='#fff';C.fillRect(cx,cy+fh*.15,fw,3);C.fillRect(cx,cy+fh*.62,fw,3);
      break;
    case 9:// USA
      C.fillStyle='#B22234';C.fillRect(cx,cy,fw,fh);
      for(let i=0;i<7;i+=2){C.fillStyle='#fff';C.fillRect(cx,cy+i*(fh/13),fw,fh/13);}
      C.fillStyle='#3C3B6E';C.fillRect(cx,cy,fw*.4,fh*.54);

      C.fillStyle='#fff';C.fillRect(cx+fw*.25,cy,fw*.5,fh);
      C.fillStyle='#FF0000';C.fillRect(cx+fw*.42,cy+fh*.2,fw*.16,fh*.6);
      break;
    case 14:// India
      C.fillStyle='#FF9933';C.fillRect(cx,cy,fw,fh/3);
      C.fillStyle='#fff';C.fillRect(cx,cy+fh/3,fw,fh/3);
      C.fillStyle='#138808';C.fillRect(cx,cy+fh*2/3,fw,fh/3);
      C.fillStyle='#000080';C.beginPath();C.arc(cx+fw/2,cy+fh/2,2,0,Math.PI*2);C.fill();

      C.fillStyle='#006AA7';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#FECC02';C.fillRect(cx+fw*.28,cy,fw*.12,fh);C.fillRect(cx,cy+fh*.38,fw,fh*.24);
      break;

      C.fillStyle='#AA151B';C.fillRect(cx,cy,fw,fh*.25);C.fillRect(cx,cy+fh*.75,fw,fh*.25);
      C.fillStyle='#F1BF00';C.fillRect(cx,cy+fh*.25,fw,fh*.5);
      break;
    case 17:// Mexico
      C.fillStyle='#006847';C.fillRect(cx,cy,fw/3,fh);
      C.fillStyle='#fff';C.fillRect(cx+fw/3,cy,fw/3,fh);
      C.fillStyle='#CE1126';C.fillRect(cx+fw*2/3,cy,fw/3,fh);
      C.fillStyle='#6B3A24';C.fillRect(cx+fw*.43,cy+fh*.3,fw*.14,fh*.4);
      break;
    case 18:// Thailand
      C.fillStyle='#ED1C24';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#fff';C.fillRect(cx,cy+fh*.17,fw,fh*.66);
      C.fillStyle='#241D4F';C.fillRect(cx,cy+fh*.33,fw,fh*.33);
      break;
    case 19:// Argentina
      C.fillStyle='#74ACDF';C.fillRect(cx,cy,fw,fh/3);C.fillRect(cx,cy+fh*2/3,fw,fh/3);
      C.fillStyle='#fff';C.fillRect(cx,cy+fh/3,fw,fh/3);
      C.fillStyle='#F6B40E';C.beginPath();C.arc(cx+fw/2,cy+fh/2,2,0,Math.PI*2);C.fill();
      break;
    case 20:// Pokemon champion (gold star flag)
    default:
      C.fillStyle='#FFD700';C.fillRect(cx,cy,fw,fh);
      C.fillStyle='#FF0000';C.fillRect(cx+fw*.1,cy+fh*.1,fw*.8,fh*.8);
      C.fillStyle='#FFD700';
      const sx=cx+fw/2,sy=cy+fh/2;
      C.beginPath();for(let i=0;i<5;i++){const a=(i*4*Math.PI/5)-Math.PI/2;C.lineTo(sx+Math.cos(a)*4,sy+Math.sin(a)*4);const a2=a+2*Math.PI/5;C.lineTo(sx+Math.cos(a2)*2,sy+Math.sin(a2)*2);}C.fill();
      break;
  }
  C.restore();
}

function drawFlag(gl,done){
  const fx=gl.c*T+T/2,fy=gl.r*T;
  // Door ON the platform
  C.fillStyle=done?'#DAA520':'#555';C.fillRect(fx-13,fy-28,26,28);
  C.fillStyle=done?'#FFD700':'#444';C.fillRect(fx-11,fy-26,22,24);
  C.fillStyle=done?'#FFF8DC':'#333';C.fillRect(fx-9,fy-24,18,22);
  if(done){
    C.fillStyle='#228B22';C.fillRect(fx-7,fy-22,14,7);
    C.fillStyle='#fff';C.font='5px "Press Start 2P"';C.textAlign='center';C.fillText('EXIT',fx,fy-17);
    C.fillStyle=`rgba(255,215,0,${.12+Math.sin(G.tm*.06)*.08})`;
    C.beginPath();C.arc(fx,fy-14,18,0,Math.PI*2);C.fill();
    C.fillStyle='#DAA520';C.fillRect(fx+5,fy-14,3,3);
  }else{
    C.fillStyle='#666';C.font='5px "Press Start 2P"';C.textAlign='center';C.fillText('LOCK',fx,fy-12);
    C.fillStyle='#888';C.fillRect(fx-3,fy-16,6,6);
    C.fillStyle='#666';C.fillRect(fx-1,fy-14,2,2);
  }
  // Flag pole
  C.fillStyle='#888';C.fillRect(fx+14,fy-34,2,34);
  C.fillStyle='#FFD700';C.beginPath();C.arc(fx+15,fy-34,2,0,Math.PI*2);C.fill();
  C.fillStyle='#666';C.fillRect(fx+10,fy-2,10,3);
  if(done){
    const w=Math.sin(G.tm*.08)*2;
    // Country flag!
    C.save();
    C.translate(w*.3,0);
    drawCountryFlag(fx+16,fy-32,16,11,G.sg);
    // Flag outline
    C.strokeStyle='#333';C.lineWidth=1;C.strokeRect(fx+16,fy-32,16,11);
    C.restore();
  }else{
    C.fillStyle='#555';C.fillRect(fx+16,fy-30,14,10);
    C.fillStyle='#444';C.font='3px "Press Start 2P"';C.textAlign='center';C.fillText('?',fx+23,fy-24);
  }
}

function drawObs(o,th){
  const ox=o.c*T+4,oy=o.r*T-18;

}

// BG
function drawBG(th){
  const gr=C.createLinearGradient(0,0,0,H);gr.addColorStop(0,th.bg);gr.addColorStop(1,th.bg2);
  C.fillStyle=gr;C.fillRect(0,0,W,H);
  const sd=G.sg*777,t=G.tm,tp=th.tp;
  if(['grass','jungle','magic'].includes(tp)){C.fillStyle='rgba(255,255,255,.25)';for(let i=0;i<3;i++){const cx=(sd+i*200+t*.1)%700-30,cy=22+i*22;C.beginPath();C.arc(cx,cy,14,0,Math.PI*2);C.arc(cx+16,cy-3,10,0,Math.PI*2);C.arc(cx+30,cy,12,0,Math.PI*2);C.fill();}}
  if(['cave','crystal','temple'].includes(tp)){C.fillStyle='rgba(100,80,60,.2)';for(let i=0;i<6;i++){const sx=(sd+i*73)%W;C.beginPath();C.moveTo(sx,0);C.lineTo(sx-3,14+i*2);C.lineTo(sx+3,14+i*2);C.fill();}for(let i=0;i<4;i++){C.fillStyle=`rgba(${tp==='crystal'?'180,100,255':'255,140,40'},${.04+Math.sin(t*.02+i)*.02})`;C.beginPath();C.arc((sd+i*109)%W,(sd+i*163)%H,10,0,Math.PI*2);C.fill();}}
  if(['ice','blizzard'].includes(tp)){C.fillStyle='rgba(255,255,255,.3)';for(let i=0;i<18;i++){const sx=(sd+i*97+t*.2+Math.sin(t*.007+i)*12)%W,sy=(sd+i*167+t*.3)%H;C.fillRect(sx,sy,2,2);}}
  if(tp==='ghost'){for(let i=0;i<4;i++){const sx=(sd+i*89)%W+Math.sin(t*.01+i)*10,sy=(sd+i*167)%(H-80)+40;C.fillStyle=`rgba(200,180,255,${.05+Math.sin(t*.015+i)*.03})`;C.beginPath();C.arc(sx,sy,10,Math.PI,0);C.fillRect(sx-10,sy,20,10);C.fill();}}
  if(['desert','thunder'].includes(tp)){C.fillStyle='rgba(200,160,80,.1)';C.beginPath();C.moveTo(0,H);for(let xx=0;xx<=W;xx+=60)C.quadraticCurveTo(xx+30,H-28-Math.sin(xx*.008+sd)*12,xx+60,H);C.fill();}
  if(['flower','rainbow'].includes(tp)){for(let i=0;i<10;i++){C.fillStyle=['rgba(255,150,200,.13)','rgba(255,220,100,.13)','rgba(200,150,255,.13)'][i%3];C.beginPath();C.arc((sd+i*83+t*.12)%W,(sd+i*127+t*.25)%H,3,0,Math.PI*2);C.fill();}}
  if(['ocean','starSea'].includes(tp)){for(let i=0;i<8;i++){C.strokeStyle=`rgba(150,220,255,${.1+Math.sin(t*.015+i)*.05})`;C.lineWidth=1;C.beginPath();C.arc((sd+i*79)%W,(H-(sd+i*137+t*.2)%H),3+i%3,0,Math.PI*2);C.stroke();}}
  if(tp==='space'){for(let i=0;i<35;i++){C.fillStyle=`rgba(255,255,255,${.1+Math.sin(t*.015+i)*.08})`;C.fillRect((sd+i*137)%W,(sd+i*251)%H,1+i%2,1+i%2);}}
  if(['volcano','lava'].includes(tp)){for(let i=0;i<5;i++){C.fillStyle=`rgba(255,80,0,${.08+Math.sin(t*.025+i)*.05})`;C.beginPath();C.arc((sd+i*71)%W,H-6-Math.sin(t*.025+i)*3,4,0,Math.PI*2);C.fill();}}
  if(tp==='cloud'){C.fillStyle='rgba(255,255,255,.12)';for(let i=0;i<5;i++){const cx=(sd+i*130+t*.06)%700-30,cy=35+i*55;C.beginPath();C.arc(cx,cy,18,0,Math.PI*2);C.arc(cx+20,cy-4,14,0,Math.PI*2);C.arc(cx+38,cy,16,0,Math.PI*2);C.fill();}}
  if(tp==='champion'){for(let i=0;i<14;i++){C.fillStyle=['rgba(255,0,0,.1)','rgba(0,100,255,.1)','rgba(255,215,0,.12)','rgba(0,200,0,.1)'][i%4];C.fillRect((sd+i*97+t*.15)%W,(sd+i*163+t*.4)%H,3,3);}}
}

function drawPlat(p,th){
  const px=p.c*T,py=p.r*T,pw=p.w*T;
  C.fillStyle=th.pM;C.fillRect(px,py+3,pw,13);
  C.fillStyle=th.pT;C.fillRect(px,py,pw,5);
  C.fillStyle='rgba(255,255,255,.15)';C.fillRect(px,py,pw,2);
  C.fillStyle='rgba(0,0,0,.06)';for(let b=0;b<pw;b+=16)C.fillRect(px+b,py+6,1,10);
  C.fillStyle=th.pB;C.fillRect(px,py+14,pw,2);
  if(['grass','jungle','magic'].includes(th.tp)){C.fillStyle='#5CBF40';for(let i=0;i<pw;i+=8){C.fillRect(px+i+1,py-2,2,3);C.fillRect(px+i+5,py-1,2,2);}}
  if(['ice','blizzard'].includes(th.tp)){C.fillStyle='rgba(255,255,255,.5)';for(let i=0;i<pw;i+=6)C.fillRect(px+i,py-1,4,2);}
}
function drawLad(l,th){
  const lx=l.c*T,lt=l.rT*T,lb=l.rB*T,lh=lb-lt;
  C.fillStyle=th.lC;C.fillRect(lx+7,lt,3,lh);C.fillRect(lx+T-10,lt,3,lh);
  C.fillStyle='rgba(255,255,255,.1)';C.fillRect(lx+7,lt,1,lh);
  for(let r=0;r<Math.floor(lh/T);r++){const ry=lt+r*T+T/2;C.fillStyle=th.lC;C.fillRect(lx+7,ry-1,T-14,3);C.fillStyle='rgba(255,255,255,.08)';C.fillRect(lx+7,ry-1,T-14,1);}
}

function draw(){
  const th=TH[(G.sg-1)%20],sd=G.sd;
  drawBG(th);if(!sd)return;
  for(const l of sd.lads)drawLad(l,th);
  for(const p of sd.plats)drawPlat(p,th);
  for(const o of G.obs)drawObs(o,th);
  for(const it of G.items)drawItem(it,G.sg);
  drawFlag(sd.goal,G.items.every(i=>i.col));
  for(const e of G.en){if(e.big)drawBM(e.px,e.r*T,e.fr,th);else drawSM(e.px,e.r*T,e.fr,th);}

  // Ghost duck
  if(G.ghost){
    const gh=G.ghost;
    C.save();C.globalAlpha=gh.alpha*(0.7+Math.sin(G.tm*.06)*.3);
    const gx=gh.x,gy=gh.y;
    const faceR=gh.dir>0;
    if(!faceR){C.translate(gx,0);C.scale(-1,1);C.translate(-gx,0);}
    // Body - translucent white/blue duck
    C.fillStyle='rgba(180,200,255,.7)';
    C.beginPath();C.ellipse(gx,gy,14,10,0,0,Math.PI*2);C.fill();
    // Head
    C.beginPath();C.arc(gx+10,gy-6,8,0,Math.PI*2);C.fill();
    // Beak
    C.fillStyle='rgba(255,180,50,.6)';
    C.beginPath();C.moveTo(gx+17,gy-7);C.lineTo(gx+23,gy-5);C.lineTo(gx+17,gy-3);C.fill();
    // Eye - glowing red
    C.fillStyle='rgba(255,50,50,.8)';C.beginPath();C.arc(gx+13,gy-8,2,0,Math.PI*2);C.fill();
    C.fillStyle='rgba(255,200,200,.5)';C.beginPath();C.arc(gx+13,gy-9,1,0,Math.PI*2);C.fill();
    // Wing
    C.fillStyle='rgba(160,180,240,.5)';
    C.beginPath();C.ellipse(gx-2,gy-3,8,5,.3,0,Math.PI*2);C.fill();
    // Ghostly trail
    C.fillStyle='rgba(180,200,255,.15)';
    for(let i=1;i<5;i++){
      C.beginPath();C.ellipse(gx-gh.dir*i*8,gy,14-i*2,10-i*2,0,0,Math.PI*2);C.fill();
    }
    C.restore();
  }

  if(G.st!=='dying'||G.dt%5<3)drawPika(P.x,P.y,P.f,P.fr,G.st==='dying',P.duck);
  for(const p of G.pt){C.fillStyle=p.col;C.globalAlpha=p.life/32;C.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);}
  C.globalAlpha=1;

  // Draw bullets (lightning bolts)
  for(const b of G.bullets){
    C.fillStyle='#FFD700';
    C.fillRect(b.x-4,b.y-2,8,4);
    C.fillStyle='#FFF';
    C.fillRect(b.x-2,b.y-1,4,2);
    // Trail
    C.fillStyle='rgba(255,215,0,.3)';
    C.fillRect(b.x-b.dir*8,b.y-1,8,2);
  }

  // HUD
  const tot=G.items.length,got=G.items.filter(i=>i.col).length;
  C.fillStyle='rgba(0,0,0,.4)';C.fillRect(W/2-50,2,100,14);
  C.fillStyle='#fff';C.font='7px "Press Start 2P"';C.textAlign='center';C.fillText(`${got}/${tot}`,W/2,12);
  // Star power indicator
  if(P.hasStar){
    C.fillStyle='rgba(255,215,0,.5)';C.fillRect(W/2+55,2,50,14);
    C.fillStyle='#FFD700';C.font='7px "Press Start 2P"';C.textAlign='center';C.fillText('⚡FIRE',W/2+80,12);
  }
  if(P.duck){C.fillStyle='rgba(80,180,255,.6)';C.font='6px "Press Start 2P"';C.textAlign='center';C.fillText('DUCK!',P.x+PW/2,P.y-6);}

  // Bonus stage intro
  if(G.isBonus&&G.st==='playing'&&G.tm<90){
    const al=G.tm<60?1:(90-G.tm)/30;C.globalAlpha=al;
    C.fillStyle='rgba(0,0,0,.6)';C.fillRect(W/2-140,H/2-35,280,65);
    C.strokeStyle='#FFD700';C.lineWidth=3;C.strokeRect(W/2-140,H/2-35,280,65);
    C.fillStyle='#FFD700';C.font='16px "Press Start 2P"';C.textAlign='center';C.fillText('⭐ BONUS STAGE! ⭐',W/2,H/2-8);
    C.fillStyle='#fff';C.font='8px "Press Start 2P"';C.fillText('아이템을 마음껏 모아라!',W/2,H/2+16);
    C.globalAlpha=1;
  }else if(!G.isBonus&&G.st==='playing'&&G.tm<75){const al=G.tm<45?1:(75-G.tm)/30;C.globalAlpha=al;C.fillStyle='rgba(0,0,0,.6)';C.fillRect(W/2-125,H/2-28,250,52);C.strokeStyle=th.pT;C.lineWidth=2;C.strokeRect(W/2-125,H/2-28,250,52);C.fillStyle='#FFD700';C.font='12px "Press Start 2P"';C.textAlign='center';C.fillText(`STAGE ${G.sg}`,W/2,H/2-6);C.fillStyle='#fff';C.font='8px "Press Start 2P"';C.fillText(th.name,W/2,H/2+14);C.globalAlpha=1;}

  if(G.st==='stageClear'){C.fillStyle=`rgba(0,0,0,${.3+Math.sin(G.ft*.07)*.06})`;C.fillRect(0,0,W,H);C.fillStyle='#FFD700';C.font='18px "Press Start 2P"';C.textAlign='center';
  if(G.isBonus){C.fillText('BONUS COMPLETE!',W/2,H/2-16);C.fillStyle='#fff';C.font='9px "Press Start 2P"';C.fillText('보너스 점수 획득!',W/2,H/2+8);}
  else{C.fillText('STAGE CLEAR!',W/2,H/2-16);C.fillStyle='#fff';C.font='9px "Press Start 2P"';C.fillText('+1000 BONUS',W/2,H/2+8);C.fillStyle=th.pT;C.font='8px "Press Start 2P"';C.fillText(th.name+' 클리어!',W/2,H/2+26);}}
  if(G.st==='victory'){C.fillStyle='rgba(0,0,0,.7)';C.fillRect(0,0,W,H);C.fillStyle='#FFD700';C.font='16px "Press Start 2P"';C.textAlign='center';C.fillText('CONGRATULATIONS!',W/2,H/2-35);C.fillStyle='#fff';C.font='10px "Press Start 2P"';C.fillText('20스테이지 올클리어!',W/2,H/2);C.fillStyle='#FFD700';C.font='12px "Press Start 2P"';C.fillText('SCORE: '+G.sc,W/2,H/2+25);C.fillStyle='#aaa';C.font='7px "Press Start 2P"';C.fillText(isTD?'TAP TO RESTART':'SPACE TO RESTART',W/2,H/2+50);}
  if(G.st==='gameOver'){C.fillStyle='rgba(0,0,0,.7)';C.fillRect(0,0,W,H);C.fillStyle='#FF4444';C.font='22px "Press Start 2P"';C.textAlign='center';C.fillText('GAME OVER',W/2,H/2-22);C.fillStyle='#FFD700';C.font='11px "Press Start 2P"';C.fillText('SCORE: '+G.sc,W/2,H/2+6);if(G.sc>=G.hi&&G.sc>0){C.fillStyle='#00FF00';C.fillText('NEW HIGH SCORE!',W/2,H/2+26);}C.fillStyle='#aaa';C.font='7px "Press Start 2P"';C.fillText(isTD?'TAP TO RESTART':'SPACE TO RESTART',W/2,H/2+50);}
}

function drawStart(){
  const t=G.tm++;
  const gr=C.createLinearGradient(0,0,0,H);gr.addColorStop(0,'#4A90D9');gr.addColorStop(1,'#2E6BB5');
  C.fillStyle=gr;C.fillRect(0,0,W,H);
  C.fillStyle='rgba(255,255,255,.2)';for(let i=0;i<3;i++){const cx=(i*220+t*.08)%700-30,cy=28+i*25;C.beginPath();C.arc(cx,cy,14,0,Math.PI*2);C.arc(cx+16,cy-3,10,0,Math.PI*2);C.arc(cx+30,cy,12,0,Math.PI*2);C.fill();}
  C.fillStyle='#4CAF50';C.fillRect(0,H-28,W,28);C.fillStyle='#388E3C';C.fillRect(0,H-28,W,3);C.fillStyle='#8B5E3C';C.fillRect(0,H-25,W,25);
  drawPika(W/2-10+Math.sin(t*.02)*30,H-28-PH,Math.sin(t*.02)>0?1:-1,Math.floor(t/8)%4,false,false);
  [{c:3,r:13,t:'ball',col:false},{c:7,r:13,t:'cherry',col:false},{c:10,r:13,t:'master',col:false},{c:13,r:13,t:'banana',col:false},{c:17,r:13,t:'ball',col:false}].forEach(i=>drawItem(i,1));
}

(function loop(){if(G.st==='start')drawStart();else{update();draw();}requestAnimationFrame(loop);})();
</script>
</body>
